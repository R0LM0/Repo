name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
    
    - name: Restore dependencies
      run: |
        dotnet restore Repo.sln
        dotnet restore Integrations/Repo.Integrations.Mapperly/Repo.Integrations.Mapperly.csproj
    
    - name: Build
      run: |
        dotnet build Repo.sln --configuration Release --no-restore
        dotnet build Integrations/Repo.Integrations.Mapperly/Repo.Integrations.Mapperly.csproj --configuration Release --no-restore
    
    - name: Test
      run: dotnet test Repo.Tests/Repo.Tests.csproj --configuration Release --no-build --verbosity normal
      continue-on-error: true
    
    - name: Pack Core Package
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/v}
        fi
        dotnet pack Repo.csproj --configuration Release --no-build -p:PackageVersion=$VERSION -o ./packages
    
    - name: Pack Mapperly Integration
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/v}
        fi
        dotnet pack Integrations/Repo.Integrations.Mapperly/Repo.Integrations.Mapperly.csproj --configuration Release --no-build -p:PackageVersion=$VERSION -o ./packages
    
    - name: Publish to NuGet
      run: |
        dotnet nuget push ./packages/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    
    - name: Upload packages as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./packages/*.nupkg
